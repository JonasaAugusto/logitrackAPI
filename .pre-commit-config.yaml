repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: poetry run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: black
        name: black
        entry: poetry run black
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: poetry run isort
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: poetry run mypy --ignore-missing-imports src/ tests/
        language: system
        types: [python]
        pass_filenames: false