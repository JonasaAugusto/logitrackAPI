name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: logitrack_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create false
      
      - name: Install dependencies
        run: poetry install --no-interaction
      
      - name: Set environment variables
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/logitrack_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          PROJECT_NAME: LogiTrack API Test
        run: echo "Environment variables set"
      
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/logitrack_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          PROJECT_NAME: LogiTrack API Test
        run: poetry run pytest tests/ -v --cov=src --cov-fail-under=50